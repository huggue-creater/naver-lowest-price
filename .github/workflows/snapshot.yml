name: 4060 대시보드 데이터 스냅샷

on:
  schedule:
    # KST 06:00 / 18:00 (UTC 21:00 / 09:00) — 데이터랩 일일 쿼터(1,000회) 내 2회
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 네이버 API 데이터 수집
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SEC: ${{ secrets.NAVER_SEC }}
        run: node 4060-insight/snapshot.js

      - name: snapshot.json 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 4060-insight/snapshot.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "데이터 스냅샷 자동 갱신 ($(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST'))"
            git push
          fi
